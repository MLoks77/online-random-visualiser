<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Image Visualiser Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class=" text-black min-h-screen flex flex-col items-center py-12 px-4 selection:bg-indigo-500/30">
    <div class="max-w-4xl w-full">
        <!-- Header -->
        <header class="text-center mb-12 space-y-4">
            <h1 class="text-5xl font-extrabold tracking-tight bg-white text-black">
                Online Random Visualiser
            </h1>
            <div class="flex justify-center space-x-4 gap-4">
                <a href="https://codeberg.org/Lelio/random-visualiser-generator" target="_blank"
                    class="text-[10px] underline uppercase tracking-widest font-black text-black ">Projet
                    original</a>
                <a href="https://github.com/MLoks77/online-random-visualiser" target="_blank"
                    class="text-[10px] underline uppercase tracking-widest font-black text-black">Projet
                    modifié</a>
            </div>
        </header>

        <!-- Main -->
        <main class="bg-white border border-black p-8 shadow-[10px_10px_0px_0px_rgba(0,0,0,0.05)]">
            <form id="vis-form" class="space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div class="space-y-8">
                        <div class="space-y-3">
                            <label class="block text-[10px] uppercase tracking-widest font-black text-black">Fichier
                                Audio</label>
                            <input type="file" id="audio" accept="audio/*"
                                class="w-full text-[10px] text-zinc-400 file:mr-4 file:py-2 file:px-4 file:border file:border-black file:bg-white file:text-black file:text-[10px] file:uppercase hover:file:bg-black hover:file:text-white file:cursor-pointer bg-transparent border-b border-black/10 p-1">
                        </div>
                        <div class="space-y-3">
                            <label class="block text-[10px] uppercase tracking-widest font-black text-black">Médias
                                Persos</label>
                            <input type="file" id="media" multiple accept="image/*,video/*"
                                class="w-full text-[10px] text-zinc-400 file:mr-4 file:py-2 file:px-4 file:border file:border-black file:bg-white file:text-black file:text-[10px] file:uppercase hover:file:bg-black hover:file:text-white file:cursor-pointer bg-transparent border-b border-black/10 p-1">
                        </div>
                        <div class="space-y-4 pt-4 border-t border-black/5">
                            <label class="flex items-center space-x-3 cursor-pointer group">
                                <input type="checkbox" id="use-picsum"
                                    class="w-4 h-4 border-2 border-black rounded-none appearance-none checked:bg-black transition-all cursor-pointer">
                                <span
                                    class="text-[10px] uppercase tracking-widest font-black text-black group-hover:opacity-70 transition-opacity">Utiliser
                                    des images stocks</span>
                            </label>
                            <div id="picsum-config" class="hidden space-y-3">
                                <label
                                    class="block text-[10px] uppercase tracking-widest font-black text-zinc-400">Nombre
                                    d'images</label>
                                <input type="number" id="picsum-count" min="1" max="50" value="20"
                                    class="w-full text-[10px] bg-transparent border-b border-black/10 p-1 focus:outline-none focus:border-black transition-colors font-mono">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full py-4 bg-black text-white text-[11px] uppercase tracking-[0.3em] font-black hover:bg-white hover:text-black border-2 border-black cursor-pointer disabled:opacity-10">
                    Générer le projet
                </button>
            </form>

            <div id="status" class="mt-8 hidden border-t border-black/10 pt-8 text-center">
                <span id="status-text" class="text-[10px] uppercase tracking-widest text-black">Calcul en
                    cours...</span>
            </div>

            <div id="result" class="mt-8 hidden border-t-2 border-black pt-8">
                <div class="aspect-video w-full bg-zinc-50 border border-black/10">
                    <video id="video-preview" controls class="w-full h-full"></video>
                </div>
                <div class="mt-6 flex justify-center">
                    <a id="download-link" href="#" target="_blank" rel="noopener noreferrer" download
                        class="text-[10px] uppercase tracking-[0.2em] font-black text-black border-2 border-black px-8 py-3 hover:bg-black hover:text-white cursor-pointer">
                        Télécharger
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
